<mat-toolbar class="topbar gap-2">

    @if (!showToggle) {
        <button (click)="toggleMobileNav.emit()" class="flex justify-center" mat-icon-button>
        <button (click)="toggleMobileNav.emit()" class="flex justify-center" mat-icon-button>
            <i class="iconify flex" data-icon="solar:hamburger-menu-linear"></i>
        </button>
    }

    <button [matMenuTriggerFor]="menu" aria-label="Notifications" mat-icon-button>
        <i class="iconify size-5.5!" data-icon="solar:bell-bing-linear"></i>
    </button>
    <mat-menu #menu="matMenu">
        <button mat-menu-item>Item 1</button>
        <button mat-menu-item>Item 2</button>
    </mat-menu>


    <span class="flex-auto"></span>

    <button [matMenuTriggerFor]="profilemenu" aria-label="Notifications"
            class="flex! items-center justify-center profile-btn-dd" extended
            mat-icon-button>
        <img class="rounded-full object-cover size-9! profile-dd" src="/assets/images/profile/user-1.jpg" width="35"  alt="profile picture"/>
    </button>
    <mat-menu #profilemenu="matMenu" class="cardWithShadow">
        <button mat-menu-item>
            <mat-icon class="flex items-center">
                <i class="iconify size-5.5!"
                   data-icon="solar:shield-user-line-duotone"></i>
            </mat-icon>
            My Profile
        </button>
        <button mat-menu-item>
            <mat-icon class="flex items-center">
                <i class="iconify size-5.5!"
                   data-icon="solar:user-id-line-duotone"></i>
            </mat-icon>
            My Account
        </button>
        <button mat-menu-item>
            <mat-icon class="flex items-center">
                <i class="iconify size-5.5!"
                   data-icon="solar:checklist-minimalistic-line-duotone"></i>
            </mat-icon>
            My Task
        </button>

        <div class="px-3 mt-3">
            <button (click)="logout()" class="w-full" mat-stroked-button>Logout</button>
        </div>
    </mat-menu>
</mat-toolbar>
