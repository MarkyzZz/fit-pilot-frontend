<div class="flex h-screen w-full items-center justify-center overflow-hidden p-2">
    <mat-card class="w-full sm:w-auto overflow-hidden auth-card mx-auto mb-0">
        <div class="grid grid-cols-12 gap-6">
            <div class="lg:col-span-6 col-span-12 flex items-stretch">
                <div class="w-full p-10 flex flex-col justify-center aling-center">
                    <h1 class="text-5xl text-center">Fit Pilot</h1>

                    <form class="mt-8" [formGroup]="form" (ngSubmit)="submit()">
                        <mat-label class="mat-subtitle-2 text-sm font-semibold mb-3 block text-start">Email
                        </mat-label>
                        <mat-form-field appearance="outline" class="w-full" color="primary">
                            <input matInput type="email" formControlName="email" />
                        </mat-form-field>

                        <mat-label class="mat-subtitle-2 text-sm font-semibold mb-3 block text-start">Password
                        </mat-label>
                        <mat-form-field appearance="outline" class="w-full" color="primary">
                            <input matInput type="password" formControlName="password" />
                        </mat-form-field>

                        <div class="flex flex-col mb-3">
                            <mat-checkbox class="-ml-2.5" color="primary">Remember this Device</mat-checkbox>
                            <a [routerLink]="['/']" class="text-primary font-semibold text-sm mt-2 hover:underline">
                                Forgot Password ?
                            </a>
                        </div>

                        <button
                            type="submit"
                            class="w-full"
                            color="primary"
                            mat-flat-button
                            [disabled]="form.invalid || isLoading() || !csrfReady()"
                        >
                            Sign In
                        </button>

                        @if (error()) {
                            <mat-error class="text-sm mt-2 block">{{ error() }}</mat-error>
                        }
                    </form>
                    <span class="flex flex-col sm:block font-medium text-center mt-6">New to Fitpilot?
                        <a [routerLink]="['/authentication/register']"
                           class="text-primary font-medium text-sm hover:underline">
                            Create an account
                        </a>
                    </span>
                </div>
            </div>
            <div class="lg:col-span-6 col-span-12 relative hidden lg:flex justify-center items-stretch bg-light">
                <div class="flex items-center justify-center w-full login-image-wrapper">
                    <img [src]="loginImage()" alt="login" class="login-image" />
                </div>
            </div>
        </div>
    </mat-card>
</div>
